name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: schoolify_app

      - name: Analyze
        run: flutter analyze
        working-directory: schoolify_app

      - name: Test
        run: flutter test
        working-directory: schoolify_app
